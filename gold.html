<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金市场 - 实时价格</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .price-card { background: white; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .price-label { font-size: 18px; color: #666; margin-bottom: 12px; }
        .price-value { font-size: 56px; font-weight: bold; color: #d4af37; }
        .price-time { color: #999; margin-top: 12px; font-size: 14px; }
        .chart-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .chart-title { font-size: 18px; color: #333; margin-bottom: 20px; }
        .loading { color: #999; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥇 黄金市场 (XAU/USD)</h1>
        
        <div class="price-card">
            <div class="price-label">当前价格</div>
            <div class="price-value" id="currentPrice"><span class="loading">加载中...</span></div>
            <div class="price-time" id="priceTime"></div>
        </div>
        
        <div class="chart-card">
            <div class="chart-title">历史价格走势</div>
            <canvas id="goldChart"></canvas>
        </div>
    </div>
    
    <script>
        let chart = null;
        
        async function loadGoldData() {
            try {
                const response = await fetch('/gold-data/history.json');
                if (!response.ok) throw new Error('数据加载失败');
                
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    document.getElementById('currentPrice').innerHTML = '<span class="error">暂无数据</span>';
                    return;
                }
                
                const latest = data[data.length - 1];
                document.getElementById('currentPrice').textContent = '$' + latest.price.toFixed(2);
                document.getElementById('priceTime').textContent = latest.datetime;
                
                const recentData = data.slice(-50);
                const labels = recentData.map(d => d.datetime.split(' ')[1]);
                const prices = recentData.map(d => d.price);
                
                const ctx = document.getElementById('goldChart').getContext('2d');
                
                if (chart) chart.destroy();
                
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '黄金价格 (USD)',
                            data: prices,
                            borderColor: '#d4af37',
                            backgroundColor: 'rgba(212, 175, 55, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 2,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: true, position: 'top' }
                        },
                        scales: {
                            x: { display: true },
                            y: {
                                ticks: { callback: v => '$' + v.toFixed(0) }
                            }
                        }
                    }
                });
                
            } catch (e) {
                console.error(e);
                document.getElementById('currentPrice').innerHTML = '<span class="error">加载失败</span>';
            }
        }
        
        loadGoldData();
        setInterval(loadGoldData, 30000);
    </script>
</body>
</html>
